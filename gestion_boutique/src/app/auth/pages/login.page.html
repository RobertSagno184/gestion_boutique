<div class="w-full max-w-[440px] mx-auto p-6">
  
  <!-- Logo Section -->
  <div class="text-center mb-16 animate-fade-in-down">
    <div class="inline-flex items-center justify-center w-16 h-16 bg-gray-900 rounded-[22px] shadow-2xl mb-6 transform hover:scale-105 transition-all duration-500">
      <i class="fas fa-tshirt text-white text-xl"></i>
    </div>
    <h1 class="text-3xl font-black tracking-[-0.05em] text-gray-900 mb-1 uppercase">MAISON MODE</h1>
    <div class="flex items-center justify-center space-x-2">
      <div class="h-[1.5px] w-4 bg-emerald-500 rounded-full"></div>
      <span class="text-[10px] font-black tracking-[0.3em] text-gray-400 uppercase">Management Studio</span>
      <div class="h-[1.5px] w-4 bg-emerald-500 rounded-full"></div>
    </div>
  </div>

  <!-- Form Card -->
  <div class="bg-white rounded-[40px] p-10 md:p-12 shadow-[0_40px_80px_-20px_rgba(0,0,0,0.06)] border border-gray-50 animate-fade-in-up">
    
    <div class="mb-10">
      <h2 class="text-2xl font-bold text-gray-900 leading-tight">Accès Privé</h2>
      <p class="text-gray-400 text-sm font-medium mt-1">Connectez-vous à votre espace gestion.</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-8">
      
      <!-- Input Email -->
      <div class="space-y-2 group">
        <label class="block text-[10px] font-black text-gray-400 tracking-widest uppercase ml-1 group-focus-within:text-emerald-600 transition-colors">Identifiant Professionnel</label>
        <div class="relative">
          <input
            type="email"
            formControlName="email"
            class="w-full px-6 py-4 bg-gray-50 border-2 border-transparent rounded-[24px] focus:bg-white focus:border-gray-900 transition-all text-gray-900 font-bold placeholder:text-gray-300 outline-none"
            placeholder="nom@maisonmode.com">
          <div class="absolute right-6 top-1/2 -translate-y-1/2 text-gray-300 group-focus-within:text-gray-900 transition-colors">
            <i class="fas fa-at"></i>
          </div>
        </div>
      </div>

      <!-- Input Password -->
      <div class="space-y-2 group">
        <div class="flex justify-between items-center ml-1">
          <label class="block text-[10px] font-black text-gray-400 tracking-widest uppercase group-focus-within:text-emerald-600 transition-colors">Clé de Sécurité</label>
          <a href="#" class="text-[10px] font-bold text-gray-300 hover:text-gray-900 transition-colors uppercase tracking-tighter">Oubliée ?</a>
        </div>
        <div class="relative">
          <input
            type="password"
            formControlName="password"
            class="w-full px-6 py-4 bg-gray-50 border-2 border-transparent rounded-[24px] focus:bg-white focus:border-gray-900 transition-all text-gray-900 font-bold placeholder:text-gray-300 outline-none"
            placeholder="••••••••">
          <div class="absolute right-6 top-1/2 -translate-y-1/2 text-gray-300 group-focus-within:text-gray-900 transition-colors">
            <i class="fas fa-lock"></i>
          </div>
        </div>
      </div>

      <!-- Error Alert -->
      <div *ngIf="errorMessage" class="p-4 bg-red-50 border border-red-100 rounded-[20px] animate-shake">
        <p class="text-[11px] text-red-600 font-black text-center uppercase tracking-tight">{{ errorMessage }}</p>
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        [disabled]="loginForm.invalid || isLoading"
        class="w-full py-6 bg-gray-900 hover:bg-black disabled:bg-gray-100 disabled:text-gray-300 text-white font-black text-xs rounded-[24px] shadow-2xl shadow-gray-200 active:scale-[0.98] transition-all duration-300 flex items-center justify-center space-x-3 mt-4 tracking-[0.2em]">
        <span *ngIf="!isLoading">OUVRIR LA SESSION</span>
        <app-loading-spinner *ngIf="isLoading" [size]="20" message=""></app-loading-spinner>
      </button>
    </form>

    <div class="mt-12 pt-8 border-t border-gray-50 text-center">
      <p class="text-gray-400 text-[11px] font-bold tracking-tight">
        PAS ENCORE DE COMPTE ?
        <a routerLink="/auth/register" class="text-emerald-600 hover:text-emerald-700 transition-colors ml-1 font-black">DEMANDER UN ACCÈS</a>
      </p>
    </div>
  </div>

  <!-- Footer Info -->
  <div class="mt-12 text-center opacity-40">
    <p class="text-[9px] font-black text-gray-400 tracking-[0.4em] uppercase leading-relaxed">
      Protected by Military Grade Encryption<br>
      &copy; 2026 MAISON MODE STUDIO
    </p>
  </div>

</div>
