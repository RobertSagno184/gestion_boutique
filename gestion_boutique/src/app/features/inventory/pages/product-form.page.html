<div class="max-w-3xl mx-auto space-y-6 pb-20 px-4">
  <!-- Header -->
  <div class="flex items-center space-x-5 mb-10 animate-fade-in-down">
    <button (click)="cancel()" class="w-12 h-12 flex items-center justify-center bg-white shadow-sm border border-gray-100 rounded-2xl hover:bg-gray-50 hover:scale-105 active:scale-95 transition-all text-gray-500">
      <i class="fas fa-chevron-left"></i>
    </button>
    <div>
      <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight leading-none mb-1">
        {{ isEditMode() ? "Détails de l'article" : "Nouvelle Pièce" }}
      </h1>
      <p class="text-sm text-gray-400 font-medium">Gestion de votre collection textile & accessoires</p>
    </div>
  </div>

  <div *ngIf="isLoading()" class="flex flex-col items-center justify-center py-20 bg-white rounded-[32px] border border-gray-50 shadow-sm">
    <app-loading-spinner [size]="60" message="Ouverture du catalogue..."></app-loading-spinner>
  </div>

  <form *ngIf="!isLoading()" [formGroup]="productForm" (ngSubmit)="onSubmit()" class="space-y-8 animate-fade-in-up">
    
    <!-- Section: Identité -->
    <div class="bg-white rounded-[32px] shadow-[0_8px_30px_rgb(0,0,0,0.02)] border border-gray-100/50 p-8 md:p-10 space-y-8">
      <div class="flex items-center justify-between border-b border-gray-50 pb-6">
        <div class="flex items-center space-x-3">
          <div class="w-10 h-10 bg-emerald-50 rounded-xl flex items-center justify-center text-emerald-600 shadow-inner">
            <i class="fas fa-fingerprint"></i>
          </div>
          <h3 class="text-xl font-bold text-gray-800">Identité & Marque</h3>
        </div>
        <span class="px-3 py-1 bg-emerald-50 text-emerald-600 text-[10px] font-black uppercase tracking-widest rounded-full">Obligatoire</span>
      </div>
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="md:col-span-2">
          <label class="block text-[11px] font-black text-gray-400 mb-2 tracking-widest uppercase">Nom commercial de l'article</label>
          <input
            formControlName="name"
            type="text"
            placeholder="Ex: Sac à main 'Elegance' Cuir Noir"
            class="w-full px-6 py-4 bg-gray-50/50 border border-transparent rounded-[20px] focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 focus:bg-white transition-all text-gray-800 font-semibold placeholder:text-gray-300">
        </div>

        <div class="md:col-span-2">
          <label class="block text-[11px] font-black text-gray-400 mb-2 tracking-widest uppercase">Type d'article</label>
          <select
            formControlName="category"
            class="w-full px-6 py-4 bg-gray-50/50 border border-transparent rounded-[20px] focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 focus:bg-white transition-all text-gray-800 font-semibold appearance-none">
            <option value="">-- Choisir une catégorie --</option>
            @for (cat of categories; track cat) {
              <option [value]="cat">{{ cat }}</option>
            }
          </select>
        </div>
      </div>
    </div>

    <!-- Section: Look & Style -->
    <div class="bg-white rounded-[32px] shadow-[0_8px_30px_rgb(0,0,0,0.02)] border border-gray-100/50 p-8 md:p-10 space-y-8">
      <div class="flex items-center space-x-3 border-b border-gray-50 pb-6">
        <div class="w-10 h-10 bg-purple-50 rounded-xl flex items-center justify-center text-purple-600 shadow-inner">
          <i class="fas fa-wand-magic-sparkles"></i>
        </div>
        <h3 class="text-xl font-bold text-gray-800">Caractéristiques Style</h3>
      </div>
      
      <div class="space-y-8">
        <div>
          <label class="block text-[11px] font-black text-gray-400 mb-3 tracking-widest uppercase">Cible / Genre</label>
          <div class="flex flex-wrap gap-3">
            @for (g of ['Homme', 'Femme', 'Unisexe', 'Enfant']; track g) {
              <button
                type="button"
                (click)="productForm.patchValue({gender: g})"
                [class]="productForm.get('gender')?.value === g 
                  ? 'bg-gray-900 text-white border-gray-900 shadow-lg scale-105' 
                  : 'bg-white text-gray-500 border-gray-100 hover:border-gray-300'"
                class="py-3 px-6 border rounded-2xl text-xs font-bold transition-all duration-300 flex items-center space-x-2">
                <i class="fas" [class.fa-mars]="g==='Homme'" [class.fa-venus]="g==='Femme'" [class.fa-unisex]="g==='Unisexe'" [class.fa-child]="g==='Enfant'"></i>
                <span>{{ g }}</span>
              </button>
            }
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
          <div>
            <label class="block text-[11px] font-black text-gray-400 mb-2 tracking-widest uppercase">Taille / Pointure</label>
            <select
              formControlName="size"
              class="w-full px-6 py-4 bg-gray-50/50 border border-transparent rounded-[20px] focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 focus:bg-white transition-all text-gray-800 font-semibold">
              @for (s of sizes; track s) {
                <option [value]="s">{{ s }}</option>
              }
            </select>
          </div>

          <div>
            <label class="block text-[11px] font-black text-gray-400 mb-2 tracking-widest uppercase">Couleur & Nuance</label>
            <div class="relative">
              <input
                formControlName="color"
                type="text"
                placeholder="Ex: Beige Sable..."
                class="w-full px-6 py-4 bg-gray-50/50 border border-transparent rounded-[20px] focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 focus:bg-white transition-all text-gray-800 font-semibold">
              <div class="absolute right-4 top-1/2 -translate-y-1/2 w-6 h-6 rounded-full shadow-inner border border-white" [style.background-color]="productForm.get('color')?.value || '#e2e8f0'"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Section: Finance -->
    <div class="bg-gradient-to-br from-emerald-600 to-teal-700 rounded-[32px] p-8 md:p-10 shadow-xl shadow-emerald-200/50">
      <div class="flex items-center space-x-3 mb-8">
        <div class="w-10 h-10 bg-white/20 backdrop-blur-md rounded-xl flex items-center justify-center text-white">
          <i class="fas fa-hand-holding-dollar"></i>
        </div>
        <h3 class="text-xl font-bold text-white">Prix & Inventaire</h3>
      </div>
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="bg-white/10 backdrop-blur-md rounded-[24px] p-6 border border-white/20">
          <label class="block text-[10px] font-black text-emerald-100 mb-2 tracking-widest uppercase">Prix d'achat (Coût)</label>
          <div class="relative">
            <input
              formControlName="costPrice"
              type="number"
              class="w-full bg-transparent border-b-2 border-emerald-300 focus:border-white transition-all text-3xl font-black text-white placeholder:text-emerald-400 outline-none py-2 pr-14">
            <span class="absolute right-0 bottom-3 text-emerald-200 font-black">FG</span>
          </div>
        </div>

        <div class="bg-white/10 backdrop-blur-md rounded-[24px] p-6 border border-white/20">
          <label class="block text-[10px] font-black text-emerald-100 mb-2 tracking-widest uppercase">Prix de vente public</label>
          <div class="relative">
            <input
              formControlName="price"
              type="number"
              class="w-full bg-transparent border-b-2 border-emerald-300 focus:border-white transition-all text-3xl font-black text-white placeholder:text-emerald-400 outline-none py-2 pr-14">
            <span class="absolute right-0 bottom-3 text-emerald-200 font-black">FG</span>
          </div>
        </div>

        <div class="md:col-span-2 bg-white/10 backdrop-blur-md rounded-[24px] p-6 border border-white/20">
          <label class="block text-[10px] font-black text-emerald-100 mb-2 tracking-widest uppercase">Pièces disponibles</label>
          <div class="flex items-center space-x-4">
            <button type="button" (click)="updateStock(-1)" class="w-10 h-10 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center text-white transition-colors">
              <i class="fas fa-minus"></i>
            </button>
            <input
              formControlName="stock"
              type="number"
              class="bg-transparent border-none text-3xl font-black text-white text-center w-24 outline-none">
            <button type="button" (click)="updateStock(1)" class="w-10 h-10 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center text-white transition-colors">
              <i class="fas fa-plus"></i>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="flex flex-col gap-4 pt-6">
      <button
        type="submit"
        [disabled]="productForm.invalid || isSubmitting()"
        class="w-full py-6 bg-gray-900 text-white font-black text-lg rounded-[24px] shadow-2xl hover:bg-emerald-600 hover:scale-[1.02] active:scale-95 transition-all duration-300 disabled:opacity-30 flex items-center justify-center space-x-3">
        <i class="fas" [class.fa-check-circle]="!isSubmitting()" [class.fa-spinner]="isSubmitting()" [class.fa-spin]="isSubmitting()"></i>
        <span>{{ isSubmitting() ? 'TRAITEMENT EN COURS...' : (isEditMode() ? 'METTRE À JOUR LA COLLECTION' : 'AJOUTER À LA COLLECTION') }}</span>
      </button>
      
      <button
        type="button"
        (click)="cancel()"
        class="w-full py-4 text-gray-400 font-bold hover:text-gray-600 transition-colors">
        ANNULER L'OPÉRATION
      </button>
    </div>
  </form>
</div>
