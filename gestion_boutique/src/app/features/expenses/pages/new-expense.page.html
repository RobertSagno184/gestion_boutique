<div class="max-w-2xl mx-auto space-y-6 pb-20 px-4">
  <!-- Header -->
  <div class="flex items-center space-x-5 mb-10 animate-fade-in-down">
    <button (click)="cancel()" class="w-12 h-12 flex items-center justify-center bg-white shadow-sm border border-gray-100 rounded-2xl hover:bg-gray-50 hover:scale-105 active:scale-95 transition-all text-gray-500">
      <i class="fas fa-chevron-left"></i>
    </button>
    <div>
      <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight leading-none mb-1">
        Nouvelle Dépense
      </h1>
      <p class="text-sm text-gray-400 font-medium">Enregistrez une sortie de caisse</p>
    </div>
  </div>

  <form [formGroup]="expenseForm" (ngSubmit)="onSubmit()" class="space-y-8 animate-fade-in-up">
    
    <!-- Main Info Card -->
    <div class="bg-white rounded-[32px] shadow-[0_8px_30px_rgb(0,0,0,0.02)] border border-gray-100/50 p-8 md:p-10 space-y-8">
      
      <!-- Amount Section -->
      <div class="bg-red-50/50 rounded-[24px] p-8 border border-red-100/50 text-center">
        <label class="block text-[11px] font-black text-red-400 mb-2 tracking-widest uppercase">Montant de la dépense</label>
        <div class="relative inline-block">
          <input
            formControlName="amount"
            type="number"
            placeholder="0"
            class="bg-transparent border-none text-5xl font-black text-red-600 text-center w-full focus:ring-0 placeholder:text-red-200 outline-none">
          <span class="absolute -right-12 bottom-2 text-red-400 font-bold text-xl">FG</span>
        </div>
      </div>

      <!-- Description / Precisions -->
      <div>
        <label class="block text-[11px] font-black text-gray-400 mb-3 tracking-widest uppercase">Objet de la dépense / Précisions</label>
        <textarea
          formControlName="description"
          rows="4"
          placeholder="Détaillez ici la raison de la dépense (ex: Achat de cintres, Transport colis, Facture électricité...)"
          class="w-full px-6 py-5 bg-gray-50/50 border border-transparent rounded-[24px] focus:ring-4 focus:ring-red-500/10 focus:border-red-400 focus:bg-white transition-all text-gray-900 font-bold placeholder:text-gray-300 resize-none"></textarea>
        <div *ngIf="expenseForm.get('description')?.invalid && expenseForm.get('description')?.touched" 
             class="text-red-500 text-[10px] font-bold mt-2 px-2 uppercase tracking-tighter">
          Veuillez préciser l'objet de la dépense
        </div>
      </div>
    </div>

    <!-- Date & Payment Card -->
    <div class="bg-white rounded-[32px] shadow-[0_8px_30px_rgb(0,0,0,0.02)] border border-gray-100/50 p-8 md:p-10 space-y-8">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div>
          <label class="block text-[11px] font-black text-gray-400 mb-2 tracking-widest uppercase">Date de l'opération</label>
          <input
            formControlName="date"
            type="date"
            class="w-full px-6 py-4 bg-gray-50/50 border border-transparent rounded-[20px] focus:ring-4 focus:ring-red-500/10 focus:border-red-400 focus:bg-white transition-all text-gray-900 font-bold">
        </div>

        <div>
          <label class="block text-[11px] font-black text-gray-400 mb-2 tracking-widest uppercase">Mode de Paiement</label>
          <select
            formControlName="paymentMethod"
            class="w-full px-6 py-4 bg-gray-50/50 border border-transparent rounded-[20px] focus:ring-4 focus:ring-red-500/10 focus:border-red-400 focus:bg-white transition-all text-gray-900 font-bold">
            @for (method of paymentMethods; track method.value) {
              <option [value]="method.value">{{ method.label }}</option>
            }
          </select>
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="flex flex-col gap-4 pt-6">
      <button
        type="submit"
        [disabled]="expenseForm.invalid || isSubmitting()"
        class="w-full py-6 bg-red-600 text-white font-black text-lg rounded-[24px] shadow-2xl shadow-red-200 hover:bg-red-700 hover:scale-[1.02] active:scale-95 transition-all duration-300 disabled:opacity-30 flex items-center justify-center space-x-3">
        <i class="fas" [class.fa-check-circle]="!isSubmitting()" [class.fa-spinner]="isSubmitting()" [class.fa-spin]="isSubmitting()"></i>
        <span>{{ isSubmitting() ? 'ENREGISTREMENT...' : 'VALIDER LA DÉPENSE' }}</span>
      </button>
      
      <button
        type="button"
        (click)="cancel()"
        class="w-full py-4 text-gray-400 font-bold hover:text-gray-600 transition-colors">
        ANNULER
      </button>
    </div>
  </form>
</div>
